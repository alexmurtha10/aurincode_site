<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AurinCode</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    
    <style>
        :root {
            --yellow: #F5C800;
            --bg-deep: #121212; /* Um pouco mais escuro para realçar o brilho */
            --glow: rgba(245, 200, 0, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-deep);
            /* Gradiente radial para profundidade, similar ao sobre.css */
            background: radial-gradient(circle at center, #1f1f1f 0%, #121212 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Syne', sans-serif;
        }

        .loader-wrapper {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
            z-index: 10;
        }

        /* Container da Logo com animação de pulso e entrada */
        .logo-container {
            position: relative;
            opacity: 0;
            transform: scale(0.9);
            animation: revealLogo 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        .logo-container img {
            width: 180px; /* Ajuste conforme necessário */
            height: auto;
            filter: drop-shadow(0 0 20px rgba(0,0,0,0.5));
            animation: pulseLogo 3s ease-in-out infinite;
        }

        /* Brilho de fundo da logo */
        .logo-container::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 120%;
            height: 120%;
            transform: translate(-50%, -50%);
            z-index: -1;
        }

        /* Barra de progresso minimalista */
        .loading-box {
            width: 200px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            opacity: 0;
            animation: fadeIn 0.8s ease forwards 0.5s;
        }

        .progress-track {
            width: 100%;
            height: 2px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 2px;
            position: relative;
            overflow: hidden;
        }

        .progress-fill {
            position: absolute;
            height: 100%;
            width: 0%;
            background: var(--yellow);
            box-shadow: 0 0 10px var(--yellow);
            animation: progressFill 2.5s cubic-bezier(0.65, 0, 0.35, 1) forwards;
        }

        .loading-text {
            color: #666;
            font-size: 10px;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 700;
        }

        /* Animações Keyframes */
        @keyframes revealLogo {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes pulseLogo {
            0%, 100% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.03); opacity: 1; }
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        @keyframes progressFill {
            0% { width: 0%; left: 0; }
            20% { width: 30%; }
            60% { width: 70%; }
            100% { width: 100%; }
        }

        /* Efeito de saída (fade out) aplicado via JS */
        .fade-out {
            opacity: 0;
            transition: opacity 0.6s ease;
            pointer-events: none;
        }

        @media (max-width: 480px) {
            .logo-container img { width: 140px; }
            .loading-box { width: 150px; }
        }
    </style>
</head>
<body>

    <div class="loader-wrapper" id="loader">
        <div class="logo-container">
            <img src="./photos/aurincodelogo.png" alt="AurinCode Logo">
        </div>
        
        <div class="loading-box">
            <div class="progress-track">
                <div class="progress-fill"></div>
            </div>
            <span class="loading-text">Iniciando Experiência</span>
        </div>
    </div>

    <script>
        window.addEventListener('load', () => {
            const loader = document.getElementById('loader');
            
            // Aguarda a animação terminar (2.8s total) para suavizar a transição
            setTimeout(() => {
                loader.classList.add('fade-out');
                
                setTimeout(() => {
                    window.location.href = "../html/inicio.html";
                }, 600); // Tempo do fade-out
                
            }, 2800);
        });
    </script>
</body>
</html>
